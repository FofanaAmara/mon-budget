<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Le Cadran — Symbol Mes Finances Direction 3 -->
  <!-- Circle: the watch bezel, precision, totality -->
  <circle cx="24" cy="24" r="21" stroke="#0F1A2E" stroke-width="1.5" fill="none"/>
  <!-- Inner circle: the dial track -->
  <circle cx="24" cy="24" r="16.5" stroke="#0F1A2E" stroke-width="0.5" fill="none" opacity="0.3"/>
  <!-- Two "hands" forming an M — the measure of mastery -->
  <!-- Left hand: from center going up-left (10 o'clock direction) -->
  <line x1="24" y1="24" x2="14.5" y2="9.5" stroke="#0F1A2E" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right hand: from center going up-right (2 o'clock direction) -->
  <line x1="24" y1="24" x2="33.5" y2="9.5" stroke="#0F1A2E" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center pivot: the precision point -->
  <circle cx="24" cy="24" r="1.8" fill="#B49A5C"/>
  <!-- Small laiton accent at 12 o'clock — the reference point -->
  <line x1="24" y1="4.5" x2="24" y2="7" stroke="#B49A5C" stroke-width="1.2" stroke-linecap="round"/>
</svg>
