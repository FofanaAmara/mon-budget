<svg viewBox="0 0 800 960" xmlns="http://www.w3.org/2000/svg">
  <!--
    MES FINANCES — Logo Concepts
    Brand: Personal finance app for francophone audience 25-45
    Archetype: Protecteur (primary) + Sage (secondary)
    Stance: radical_simplicity
    Primary color: Deep Teal #0F766E ("Serenite")
    Accent color: Warm Amber #F59E0B ("Progres")
  -->

  <!-- ========================================== -->
  <!-- CONCEPT A: "LE COMPAS"                     -->
  <!-- RECOMMENDED PRIMARY LOGO                   -->
  <!--                                            -->
  <!-- A rounded protective container with a      -->
  <!-- knockout growth trajectory. The shape       -->
  <!-- shelters; the path rises. Protection +      -->
  <!-- Progress in one mark.                       -->
  <!-- ========================================== -->

  <g id="concept-a" transform="translate(400, 140)">
    <!-- The mark -->
    <g transform="translate(0, 0)">
      <!-- Protective rounded container -->
      <rect x="-36" y="-36" width="72" height="72" rx="18" fill="#0F766E"/>

      <!-- Growth trajectory — a single confident curve
           rising from bottom-left to upper-right.
           The line is financial progress made visible.
           Its smoothness says: this growth is steady, not volatile. -->
      <path d="M-18 22 C-10 18, -4 8, 0 0 S10 -8, 14 -4 S22 -14, 24 -22"
            stroke="#FAFBFC" stroke-width="4" stroke-linecap="round" fill="none"/>

      <!-- Milestone dot at the peak — the goal reached.
           Amber = warmth of achievement, the sunrise moment. -->
      <circle cx="24" cy="-22" r="3.5" fill="#F59E0B"/>
    </g>

    <!-- Wordmark -->
    <text x="0" y="66" text-anchor="middle"
          font-family="'Plus Jakarta Sans', 'DM Sans', system-ui, -apple-system, sans-serif"
          font-weight="800" font-size="26" letter-spacing="-0.5" fill="#0F172A">Mes
      <tspan font-weight="600" fill="#0F766E" dx="3">Finances</tspan>
    </text>

    <!-- Tagline -->
    <text x="0" y="86" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-weight="400" font-size="10" letter-spacing="2" fill="#64748B" text-transform="uppercase">
      VOS FINANCES, EN CLAIR.
    </text>

    <!-- Label -->
    <text x="0" y="116" text-anchor="middle"
          font-family="'Inter', system-ui, sans-serif"
          font-weight="500" font-size="8" fill="#94A3B8" letter-spacing="3">
      CONCEPT A — LE COMPAS (RECOMMANDE)
    </text>
  </g>

  <!-- ========================================== -->
  <!-- CONCEPT B: "LE M ASCENDANT"                -->
  <!--                                            -->
  <!-- The letter M abstracted as two peaks —      -->
  <!-- the left grounded, the right reaching       -->
  <!-- higher. Asymmetry creates dynamism.         -->
  <!-- A stable baseline anchors the ambition.     -->
  <!-- ========================================== -->

  <g id="concept-b" transform="translate(400, 420)">
    <!-- The mark -->
    <g transform="translate(0, 0)">
      <!-- The asymmetric M: two strokes forming peaks.
           Left peak is lower (current state).
           Right peak is higher (future state / goals).
           The valley between = the journey.
           Together they form an abstract M for "Mes". -->
      <path d="M-28 28 L-28 -4 L0 16 L28 -28 L28 28"
            stroke="#0F766E" stroke-width="5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Stable baseline — the financial foundation.
           Lighter opacity: it's there, supporting,
           but not dominating. -->
      <line x1="-36" y1="28" x2="36" y2="28"
            stroke="#0F766E" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

      <!-- Achievement dot at the highest peak -->
      <circle cx="28" cy="-28" r="3.5" fill="#F59E0B"/>
    </g>

    <!-- Wordmark -->
    <text x="0" y="66" text-anchor="middle"
          font-family="'Plus Jakarta Sans', 'DM Sans', system-ui, -apple-system, sans-serif"
          font-weight="800" font-size="26" letter-spacing="-0.5" fill="#0F172A">Mes
      <tspan font-weight="600" fill="#0F766E" dx="3">Finances</tspan>
    </text>

    <!-- Tagline -->
    <text x="0" y="86" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-weight="400" font-size="10" letter-spacing="2" fill="#64748B">
      VOS FINANCES, EN CLAIR.
    </text>

    <!-- Label -->
    <text x="0" y="116" text-anchor="middle"
          font-family="'Inter', system-ui, sans-serif"
          font-weight="500" font-size="8" fill="#94A3B8" letter-spacing="3">
      CONCEPT B — LE M ASCENDANT
    </text>
  </g>

  <!-- ========================================== -->
  <!-- CONCEPT C: "LA CLAIRIERE"                  -->
  <!--                                            -->
  <!-- A circle with a deliberate opening —        -->
  <!-- the "clearing" where clarity lives.         -->
  <!-- Inside: a small sprout. Growth emerges      -->
  <!-- from clarity. "En clair" made visual.       -->
  <!-- ========================================== -->

  <g id="concept-c" transform="translate(400, 700)">
    <!-- The mark -->
    <g transform="translate(0, 0)">
      <!-- The broken circle — completeness with an opening.
           The gap faces upper-right: the direction of progress.
           The arc is thick and confident, not timid. -->
      <path d="M22 -26 A32 32 0 1 0 28 -20"
            stroke="#0F766E" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- Sprout/growth element inside the circle.
           Two simple leaves diverging from a single stem.
           Organic, alive, growing upward through the opening. -->
      <path d="M0 16 L0 -4"
            stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
      <path d="M0 2 C-4 -2, -10 -6, -12 -12"
            stroke="#0F766E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M0 -2 C4 -6, 10 -10, 14 -14"
            stroke="#0F766E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Seed point — where growth begins -->
      <circle cx="0" cy="18" r="3" fill="#F59E0B"/>
    </g>

    <!-- Wordmark -->
    <text x="0" y="72" text-anchor="middle"
          font-family="'Plus Jakarta Sans', 'DM Sans', system-ui, -apple-system, sans-serif"
          font-weight="800" font-size="26" letter-spacing="-0.5" fill="#0F172A">Mes
      <tspan font-weight="600" fill="#0F766E" dx="3">Finances</tspan>
    </text>

    <!-- Tagline -->
    <text x="0" y="92" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-weight="400" font-size="10" letter-spacing="2" fill="#64748B">
      VOS FINANCES, EN CLAIR.
    </text>

    <!-- Label -->
    <text x="0" y="122" text-anchor="middle"
          font-family="'Inter', system-ui, sans-serif"
          font-weight="500" font-size="8" fill="#94A3B8" letter-spacing="3">
      CONCEPT C — LA CLAIRIERE
    </text>
  </g>

  <!-- ========================================== -->
  <!-- FAVICON / APP ICON VARIATIONS              -->
  <!-- ========================================== -->

  <g id="app-icons" transform="translate(400, 910)">
    <text x="0" y="-30" text-anchor="middle"
          font-family="'Inter', system-ui, sans-serif"
          font-weight="600" font-size="8" fill="#94A3B8" letter-spacing="3">
      APP ICON VARIATIONS
    </text>

    <!-- Concept A icon -->
    <g transform="translate(-120, 0)">
      <rect x="-24" y="-24" width="48" height="48" rx="12" fill="#0F766E"/>
      <path d="M-12 14 C-6 10, -2 4, 0 0 S6 -4, 8 -2 S14 -8, 16 -14"
            stroke="#FAFBFC" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="16" cy="-14" r="2.5" fill="#F59E0B"/>
      <text x="0" y="40" text-anchor="middle"
            font-family="'Inter', system-ui, sans-serif"
            font-size="7" fill="#94A3B8">A</text>
    </g>

    <!-- Concept B icon -->
    <g transform="translate(0, 0)">
      <rect x="-24" y="-24" width="48" height="48" rx="12" fill="#0F766E"/>
      <path d="M-14 14 L-14 -2 L0 8 L14 -14 L14 14"
            stroke="#FAFBFC" stroke-width="3.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="14" cy="-14" r="2.5" fill="#F59E0B"/>
      <text x="0" y="40" text-anchor="middle"
            font-family="'Inter', system-ui, sans-serif"
            font-size="7" fill="#94A3B8">B</text>
    </g>

    <!-- Concept C icon -->
    <g transform="translate(120, 0)">
      <rect x="-24" y="-24" width="48" height="48" rx="12" fill="#0F766E"/>
      <path d="M10 -14 A16 16 0 1 0 14 -12"
            stroke="#FAFBFC" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M0 8 L0 -2"
            stroke="#FAFBFC" stroke-width="2" stroke-linecap="round"/>
      <path d="M0 1 C-2 -1, -5 -3, -6 -6"
            stroke="#FAFBFC" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M0 -1 C2 -3, 5 -5, 7 -7"
            stroke="#FAFBFC" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="10" r="2" fill="#F59E0B"/>
      <text x="0" y="40" text-anchor="middle"
            font-family="'Inter', system-ui, sans-serif"
            font-size="7" fill="#94A3B8">C</text>
    </g>
  </g>
</svg>